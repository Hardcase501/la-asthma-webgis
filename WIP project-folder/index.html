<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Los Angeles County Adult Asthma Prevalence</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Los Angeles County Adult Asthma Prevalence</h1>
    <p>Responsive Leaflet map and D3 histogram using CDC PLACES tract point data</p>
  </header>

  <div id="controls">
    <label for="symbolToggle" class="control-item">
      <input type="checkbox" id="symbolToggle" checked />
      Use scaled symbols
    </label>

    <label for="filterSelect" class="control-item">
      Filter asthma level:
    </label>
    <select id="filterSelect" class="control-item">
      <option value="all">All tracts</option>
      <option value="low">Low (&lt; 8%)</option>
      <option value="medium">Medium (8–10%)</option>
      <option value="high">High (&gt; 10%)</option>
    </select>
  </div>

  <div id="layout">
    <section id="map-panel">
      <div id="map"></div>
    </section>

    <section id="chart-panel">
      <h2>Distribution of Asthma Prevalence Across Census Tracts</h2>
      <div id="chart-wrapper">
        <svg id="chart"></svg>
      </div>

      <div id="legend">
        <h3>Legend</h3>
        <p><span class="legend-dot high"></span> High (&gt;10%)</p>
        <p><span class="legend-dot medium"></span> Medium (8–10%)</p>
        <p><span class="legend-dot low"></span> Low (&lt;8%)</p>
      </div>
    </section>
  </div>

  <div id="tooltip" class="hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
